<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кроссворды - Медицинские темы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2em;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .crossword-link {
            display: block;
            padding: 25px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.4em;
            font-weight: bold;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .crossword-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.6);
        }

        .crossword-link.pharma {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .crossword-link.pharma:hover {
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.6);
        }

        .icon {
            font-size: 1.5em;
            margin-right: 10px;
        }

        .description {
            display: block;
            font-size: 0.7em;
            font-weight: normal;
            margin-top: 8px;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .crossword-link {
                font-size: 1.1em;
                padding: 20px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Интерактивные кроссворды</h1>
        <p class="subtitle">Выберите тему для решения кроссворда</p>
        
        <div class="links-container">
            <a href="krossvordRU.html" class="crossword-link">
                <span class="icon">🏥</span>Кроссворд: Анатомия
                <span class="description">10 слов о строении человеческого тела</span>
            </a>
            
            <a href="krossvordFa.html" class="crossword-link pharma">
                <span class="icon">💊</span>Кроссворд: Фармакология
                <span class="description">5 слов о лекарственных средствах</span>
            </a>
        </div>
    </div>
</body>
</html>
