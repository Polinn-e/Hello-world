<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Образовательные материалы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            margin: 20px auto;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        /* Стили для меню выбора */
        .menu-container {
            text-align: center;
            padding: 40px 20px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.2em;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .crossword-link {
            display: block;
            padding: 25px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 1.4em;
            font-weight: bold;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            border: none;
        }

        .crossword-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.6);
        }

        .crossword-link.pharma {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 5px 15px rgba(17, 153, 142, 0.4);
        }

        .crossword-link.pharma:hover {
            box-shadow: 0 10px 25px rgba(17, 153, 142, 0.6);
        }

        .crossword-link.presentation {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .crossword-link.presentation:hover {
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.6);
        }

        .icon {
            font-size: 1.5em;
            margin-right: 10px;
        }

        .description {
            display: block;
            font-size: 0.7em;
            font-weight: normal;
            margin-top: 8px;
            opacity: 0.9;
        }

        /* Стили для кроссворда */
        .crossword-section {
            display: none;
        }

        .crossword-section.active {
            display: block;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-button:hover {
            background: #5568d3;
            transform: translateX(-5px);
        }

        .crossword-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .grid-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid {
            display: grid;
            gap: 2px;
            background: #333;
            padding: 2px;
            border-radius: 5px;
        }

        .cell {
            width: 42px;
            height: 42px;
            position: relative;
            background: white;
        }

        .cell.empty {
            background: #333;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            background: white;
            outline: none;
            cursor: pointer;
        }

        .cell input:focus {
            background: #fff3cd;
        }

        .cell input.highlight {
            background: #e3f2fd;
        }

        .cell input.correct {
            background: #d4edda;
            color: #155724;
        }

        .cell input.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .cell .number {
            position: absolute;
            top: 2px;
            left: 2px;
            font-size: 10px;
            color: #667eea;
            font-weight: bold;
            pointer-events: none;
            z-index: 1;
        }

        .clues {
            flex: 1;
            min-width: 300px;
            max-width: 450px;
        }

        .clues-section {
            margin-bottom: 20px;
        }

        .clues-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .clue {
            margin: 8px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .clue:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .clue.active {
            background: #667eea;
            color: white;
            border-left-color: #4a5bb8;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-check {
            background: #28a745;
            color: white;
        }

        .btn-check:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-show {
            background: #ffc107;
            color: #333;
        }

        .btn-show:hover {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }

        .btn-clear {
            background: #dc3545;
            color: white;
        }

        .btn-clear:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        /* Стили для фармакологии */
        .pharma-theme h1 {
            color: #11998e;
        }

        .pharma-theme .clues-section h3 {
            color: #11998e;
            border-bottom-color: #11998e;
        }

        .pharma-theme .cell .number {
            color: #11998e;
        }

        .pharma-theme .clue.active {
            background: #11998e;
            border-left-color: #0a6c62;
        }

        .pharma-theme .back-button {
            background: #11998e;
        }

        .pharma-theme .back-button:hover {
            background: #0d7a71;
        }

        /* Стили для презентации */
        .presentation-section {
            display: none;
        }

        .presentation-section.active {
            display: block;
        }

        .presentation-section .back-button {
            background: #f5576c;
        }

        .presentation-section .back-button:hover {
            background: #e04458;
        }

        .presentation-section h1 {
            color: #f5576c;
        }

        .presentation {
            max-width: 1000px;
            margin: 0 auto;
        }

        .presentation-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #f5576c;
            padding-bottom: 15px;
        }

        .slide-counter {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .slide {
            display: none;
            animation: fadeIn 0.5s;
        }

        .slide.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.3);
        }

        .task h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task p {
            font-size: 1.1em;
            line-height: 1.6;
        }

        .code-container {
            position: relative;
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f5576c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            z-index: 10;
        }

        .copy-btn:hover {
            background: #e04458;
            transform: scale(1.05);
        }

        .copy-btn.copied {
            background: #28a745;
        }

        pre {
            margin: 0;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
        }

        /* Подсветка синтаксиса */
        .keyword { color: #569cd6; font-weight: bold; }
        .string { color: #ce9178; }
        .comment { color: #6a9955; font-style: italic; }
        .function { color: #dcdcaa; }
        .number { color: #b5cea8; }
        .builtin { color: #4ec9b0; }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 15px;
        }

        .nav-btn {
            background: #f5576c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 140px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #e04458;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .slide-dots {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
            flex: 1;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active {
            background: #f5576c;
            transform: scale(1.3);
        }

        .dot:hover {
            background: #999;
        }

        .hint {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            margin-top: 15px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .crossword-container {
                flex-direction: column;
                align-items: center;
            }

            .cell {
                width: 30px;
                height: 30px;
            }

            .cell input {
                font-size: 14px;
            }

            .cell .number {
                font-size: 8px;
            }

            h1 {
                font-size: 1.8em;
            }

            button.action-btn {
                min-width: 120px;
                font-size: 14px;
                padding: 10px 16px;
            }

            .container {
                padding: 20px;
            }

            .crossword-link {
                font-size: 1.1em;
                padding: 20px 25px;
            }

            .task h2 {
                font-size: 1.1em;
            }

            .task p {
                font-size: 1em;
            }

            pre {
                font-size: 12px;
            }

            .nav-btn {
                padding: 10px 15px;
                font-size: 14px;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главное меню -->
        <div id="mainMenu" class="menu-container">
            <h1>📚 Образовательные материалы</h1>

                <button onclick="showPresentation()" class="crossword-link presentation">

        <div id="pharmaSection" class="crossword-section pharma-theme">

            <div class="crossword-container">
                <div class="grid-wrapper">
                    <div class="grid" id="pharmaGrid"></div>
                    
                    <div class="buttons">
                        <button class="action-btn btn-check" onclick="checkAnswers('pharma')">✓ Проверить</button>
                        <button class="action-btn btn-show" onclick="showAnswers('pharma')">👁 Показать ответы</button>
                        <button class="action-btn btn-clear" onclick="clearAll('pharma')">🗑 Очистить</button>
                    </div>
                    
                    <div class="message" id="pharmaMessage"></div>

                <div class="clues">

                    <div class="clues-section">

        </div>

        <!-- Презентация -->

            <div class="presentation">

                <div class="hint">💡 Используйте стрелки ← → на клавиатуре для навигации</div>

    </div>

            if (!presentationInitialized) {

        // Инициализация кроссворда
        function initCrossword(type, data) {
            createGrid(type, data);
            createClues(type, data);
        }

        // Создание сетки
        function createGrid(type, data) {
            const gridId = type + 'Grid';
            const grid = document.getElementById(gridId);
            grid.style.gridTemplateColumns = `repeat(${data.cols}, 42px)`;
            
            for (let row = 0; row < data.rows; row++) {
                for (let col = 0; col < data.cols; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (data.grid[row] && data.grid[row][col] !== '') {
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.maxLength = 1;
                        input.dataset.row = row;
                        input.dataset.col = col;
                        input.dataset.type = type;
                        
                        input.addEventListener('input', handleInput);
                        input.addEventListener('keydown', handleKeyDown);
                        input.addEventListener('focus', () => onCellFocus(type, row, col));
                        
                        cell.appendChild(input);
                        
                        const number = getWordNumber(type, data, row, col);
                        if (number) {
                            const numberSpan = document.createElement('span');
                            numberSpan.className = 'number';
                            numberSpan.textContent = number;
                            cell.appendChild(numberSpan);
                        }
                    } else {
                        cell.classList.add('empty');
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }

        function getWordNumber(type, data, row, col) {
            const allWords = [...data.words.across, ...data.words.down];
            const word = allWords.find(w => w.row === row && w.col === col);
            return word ? word.number : null;
        }

        // Создание подсказок
        function createClues(type, data) {
            const acrossCluesId = type + 'AcrossClues';
            const downCluesId = type + 'DownClues';
            const acrossClues = document.getElementById(acrossCluesId);
            const downClues = document.getElementById(downCluesId);
            
            data.words.across.forEach(word => {
                const clue = document.createElement('div');
                clue.className = 'clue';
                clue.dataset.number = word.number;
                clue.dataset.direction = 'across';
                clue.dataset.type = type;
                clue.textContent = `${word.number}. ${word.clue}`;
                clue.onclick = () => selectWord(type, word);
                acrossClues.appendChild(clue);
            });
            
            data.words.down.forEach(word => {
                const clue = document.createElement('div');
                clue.className = 'clue';
                clue.dataset.number = word.number;
                clue.dataset.direction = 'down';
                clue.dataset.type = type;
                clue.textContent = `${word.number}. ${word.clue}`;
                clue.onclick = () => selectWord(type, word);
                downClues.appendChild(clue);
            });
        }

        // Обработка ввода
        function handleInput(e) {
            const input = e.target;
            const value = input.value.toUpperCase();
            input.value = value;
            input.classList.remove('correct', 'incorrect');
            
            if (value) {
                moveToNext(input);
            }
        }

        function handleKeyDown(e) {
            const input = e.target;
            const type = input.dataset.type;
            const row = parseInt(input.dataset.row);
            const col = parseInt(input.dataset.col);
            
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                activeDirections[type] = 'across';
                focusCell(type, row, col + 1);
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                activeDirections[type] = 'across';
                focusCell(type, row, col - 1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeDirections[type] = 'down';
                focusCell(type, row + 1, col);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeDirections[type] = 'down';
                focusCell(type, row - 1, col);
            } else if (e.key === 'Backspace' && !input.value) {
                e.preventDefault();
                moveToPrev(input);
            } else if (e.key === 'Tab') {
                e.preventDefault();
                activeDirections[type] = activeDirections[type] === 'across' ? 'down' : 'across';
                if (activeWords[type]) highlightWord(type, activeWords[type]);
            }
        }

        function moveToNext(input) {
            const type = input.dataset.type;
            const row = parseInt(input.dataset.row);
            const col = parseInt(input.dataset.col);
            
            if (activeDirections[type] === 'across') {
                focusCell(type, row, col + 1);
            } else {
                focusCell(type, row + 1, col);
            }
        }

        function moveToPrev(input) {
            const type = input.dataset.type;
            const row = parseInt(input.dataset.row);
            const col = parseInt(input.dataset.col);
            
            if (activeDirections[type] === 'across') {
                focusCell(type, row, col - 1);
            } else {
                focusCell(type, row - 1, col);
            }
        }

        function focusCell(type, row, col) {
            const input = document.querySelector(`input[data-type="${type}"][data-row="${row}"][data-col="${col}"]`);
            if (input) {
                input.focus();
            }
        }

        function onCellFocus(type, row, col) {
            const data = type === 'anatomy' ? anatomyData : pharmaData;
            const startWord = findWordStartingAt(type, data, row, col);
            if (startWord) {
                selectWord(type, startWord);
                return;
            }
            
            const containingWord = findWordContaining(type, data, row, col);
            if (containingWord) {
                selectWord(type, containingWord);
            }
        }

        function findWordStartingAt(type, data, row, col) {
            const allWords = [...data.words.across, ...data.words.down];
            return allWords.find(w => w.row === row && w.col === col);
        }

        function findWordContaining(type, data, row, col) {
            const allWords = [...data.words.across, ...data.words.down];
            
            const activeWordsList = allWords.filter(w => w.direction === activeDirections[type]);
            for (const word of activeWordsList) {
                if (containsCell(word, row, col)) return word;
            }
            
            for (const word of allWords) {
                if (containsCell(word, row, col)) {
                    activeDirections[type] = word.direction;
                    return word;
                }
            }
            return null;
        }

        function containsCell(word, row, col) {
            if (word.direction === 'across') {
                return word.row === row && col >= word.col && col < word.col + word.word.length;
            } else {
                return word.col === col && row >= word.row && row < word.row + word.word.length;
            }
        }

        function selectWord(type, word) {
            activeWords[type] = word;
            activeDirections[type] = word.direction;
            highlightWord(type, word);
            
            const input = document.querySelector(`input[data-type="${type}"][data-row="${word.row}"][data-col="${word.col}"]`);
            if (input) input.focus();
            
            document.querySelectorAll(`.clue[data-type="${type}"]`).forEach(clue => clue.classList.remove('active'));
            const clueElement = document.querySelector(`.clue[data-type="${type}"][data-number="${word.number}"][data-direction="${word.direction}"]`);
            if (clueElement) clueElement.classList.add('active');
        }

        function highlightWord(type, word) {
            document.querySelectorAll(`input[data-type="${type}"]`).forEach(input => {
                input.classList.remove('highlight');
            });
            
            for (let i = 0; i < word.word.length; i++) {
                const row = word.direction === 'across' ? word.row : word.row + i;
                const col = word.direction === 'across' ? word.col + i : word.col;
                const input = document.querySelector(`input[data-type="${type}"][data-row="${row}"][data-col="${col}"]`);
                if (input) {
                    input.classList.add('highlight');
                }
            }
        }

        // Проверка ответов
        function checkAnswers(type) {
            const data = type === 'anatomy' ? anatomyData : pharmaData;
            let allCorrect = true;
            let hasEmpty = false;
            
            document.querySelectorAll(`input[data-type="${type}"]`).forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                const correctLetter = data.grid[row][col];
                const userLetter = input.value.toUpperCase();
                
                input.classList.remove('correct', 'incorrect');
                
                if (!userLetter) {
                    hasEmpty = true;
                } else if (userLetter === correctLetter) {
                    input.classList.add('correct');
                } else {
                    input.classList.add('incorrect');
                    allCorrect = false;
                }
            });
            
            showMessage(type, allCorrect && !hasEmpty, hasEmpty);
        }

        function showAnswers(type) {
            const data = type === 'anatomy' ? anatomyData : pharmaData;
            document.querySelectorAll(`input[data-type="${type}"]`).forEach(input => {
                const row = parseInt(input.dataset.row);
                const col = parseInt(input.dataset.col);
                input.value = data.grid[row][col];
                input.classList.remove('incorrect');
                input.classList.add('correct');
            });
            const message = document.getElementById(type + 'Message');
            message.textContent = '📖 Правильные ответы показаны';
            message.className = 'message success';
        }

        function clearAll(type) {
            document.querySelectorAll(`input[data-type="${type}"]`).forEach(input => {
                input.value = '';
                input.classList.remove('correct', 'incorrect', 'highlight');
            });
            document.getElementById(type + 'Message').className = 'message';
            document.getElementById(type + 'Message').textContent = '';
        }

        function showMessage(type, success, hasEmpty) {
            const message = document.getElementById(type + 'Message');
            if (success) {
                message.textContent = '🎉 Поздравляем! Кроссворд решён правильно!';
                message.className = 'message success';
            } else if (hasEmpty) {
                message.textContent = '⚠️ Заполните все клетки!';
                message.className = 'message error';
            } else {
                message.textContent = '❌ Есть ошибки. Попробуйте ещё раз!';
                message.className = 'message error';
            }
        }

        // Функции для презентации
        function highlightPython(code) {
            let html = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            html = html.replace(/(#[^\n]*)/g, '<span class="comment">$1</span>');
            html = html.replace(/(&quot;[^&]*?&quot;|"[^"]*?"|'[^']*?')/g, '<span class="string">$1</span>');

            const keywords = ['import', 'from', 'def', 'class', 'if', 'elif', 'else', 'for', 'while', 'in', 'return', 'break', 'continue', 'with', 'as', 'try', 'except', 'finally', 'raise', 'pass', 'and', 'or', 'not', 'True', 'False', 'None'];
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b(${kw})\\b`, 'g');
                html = html.replace(regex, '<span class="keyword">$1</span>');
            });

            const builtins = ['print', 'input', 'int', 'float', 'str', 'len', 'range', 'sum', 'open', 'math', 'sqrt', 'replace', 'split', 'isdigit', 'append'];
            builtins.forEach(fn => {
                const regex = new RegExp(`\\b(${fn})\\b(?=\\s*\\()`, 'g');
                html = html.replace(regex, '<span class="builtin">$1</span>');
            });

            html = html.replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>');

            return html;
        }

        function createSlides() {
            const container = document.getElementById('slidesContainer');
            const dotsContainer = document.getElementById('slideDots');

            slides.forEach((slide, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide' + (index === 0 ? ' active' : '');
                slideDiv.dataset.index = index;

                slideDiv.innerHTML = `
                    <div class="task">
                        <h2>📝 ${slide.title}</h2>
                        <p>${slide.task}</p>
                    </div>
                    <div class="code-container">
                        <button class="copy-btn" onclick="copyCode(${index})">📋 Копировать</button>
                        <pre><code>${highlightPython(slide.code)}</code></pre>
                    </div>
                `;

                container.appendChild(slideDiv);

                const dot = document.createElement('div');
                dot.className = 'dot' + (index === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(index);
                dotsContainer.appendChild(dot);
            });
        }

        function goToSlide(index) {
            const allSlides = document.querySelectorAll('.slide');
            const allDots = document.querySelectorAll('.dot');

            allSlides[currentSlide].classList.remove('active');
            allDots[currentSlide].classList.remove('active');

            currentSlide = index;

            allSlides[currentSlide].classList.add('active');
            allDots[currentSlide].classList.add('active');

            updateNavigation();
        }

        function changeSlide(direction) {
            const newIndex = currentSlide + direction;
            if (newIndex >= 0 && newIndex < slides.length) {
                goToSlide(newIndex);
            }
        }

        function updateNavigation() {
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === slides.length - 1;
            document.getElementById('slideCounter').textContent = `Слайд ${currentSlide + 1} из ${slides.length}`;
        }

        function copyCode(index) {
            const code = slides[index].code;
            navigator.clipboard.writeText(code).then(() => {
                const buttons = document.querySelectorAll('.copy-btn');
                const btn = buttons[index];
                const originalText = btn.textContent;
                btn.textContent = '✓ Скопировано!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Обработка клавиатуры для презентации
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('presentationSection').classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    changeSlide(-1);
                } else if (e.key === 'ArrowRight') {
                    changeSlide(1);
                } else if (e.key === 'Home') {
                    goToSlide(0);
                } else if (e.key === 'End') {
                    goToSlide(slides.length - 1);
                }
            }
        });
    </script>
</body>
</html>
